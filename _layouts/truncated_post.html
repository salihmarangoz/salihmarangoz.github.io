layout: default
---

<div class="posts">

<!-- https://jekyllrb.com/docs/posts/

  {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
-->

  <div class="repo-container">
  {% for post in site.posts %}
    <article class="card">
      <div class="card-body">

        {% if post.feature-img %}
            <div class="card-image">
              <a href="{{ site.baseurl }}{{ post.url }}">
                <img src="{{ site.baseurl }}{{ post.feature-img }}" alt="Feature Image"/>
              </a>
            </div>
        {% endif %}

        <div class="card-title">
            <h1>
                <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
            </h1>
        </div>
        <div class="card-exceprt">
            <p>
                {{ post.excerpt }} 
            </p>
        </div>

        <!-- read more -->
        <center><a class="btn" href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a></center>

      </div>
    </article>
  {% endfor %}
</div>
</div>
